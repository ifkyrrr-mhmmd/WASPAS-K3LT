name: spk_waspas_k3lt
description: >
  Sistem Pendukung Keputusan Seleksi Kepala Divisi K3LT
  menggunakan metode WASPAS (Weighted Aggregated Sum Product Assessment).
  Dibuat oleh Kelompok 2 — Teknik Informatika.

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.6.0
  cloud_firestore: ^5.6.0

  # State Management
  provider: ^6.1.2
  shared_preferences: ^2.2.3

  # UI & Fonts
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8

  # PDF Export
  pdf: ^3.11.2
  printing: ^5.14.0

  # Utilities
  intl: ^0.19.0
  http: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/google_logo.png
